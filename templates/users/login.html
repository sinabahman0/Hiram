<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ورود</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <h2 class="mb-4">ورود</h2>

            {% if form.non_field_errors %}
                <div class="alert alert-danger">
                    {% for error in form.non_field_errors %}
                        <p>{{ error }}</p>
                    {% endfor %}
                </div>
            {% endif %}

            <form method="POST">
                {% csrf_token %}

                <div class="mb-3">
                    <label for="{{ form.username.id_for_label }}" class="form-label">نام کاربری</label>
                    {{ form.username }}
                </div>

                <div class="mb-3">
                    <label for="{{ form.password.id_for_label }}" class="form-label">رمز عبور</label>
                    {{ form.password }}
                </div>

                <button type="submit" class="btn btn-primary w-100">ورود</button>
            </form>

            <p class="mt-3 text-center">
                ثبت‌نام نکرده‌ای؟ <a href="{% url 'signup' %}">ثبت‌نام کن</a>
            </p>
        </div>
    </div>
</div>
</body>
</html>
